<section class="rounded-mm-2xl bg-surface-base shadow-mm-sm border border-border-soft overflow-hidden">
  <header class="flex items-start justify-between gap-4 px-6 py-5 border-b border-border-soft bg-surface-base">
    <div class="flex flex-col gap-1 min-w-0">
      <h3 class="font-display text-lg font-medium text-ink-dark leading-snug">
        {{ heading() }}
      </h3>
      @if (description()) {
        <p class="text-sm text-ink-secondary leading-relaxed">{{ description() }}</p>
      }
    </div>

    @if (hasCode()) {
      <button
        type="button"
        (click)="toggleCode()"
        [attr.aria-expanded]="showCode()"
        [attr.aria-label]="showCode() ? 'Ocultar código' : 'Ver código'"
        class="shrink-0 inline-flex items-center gap-1.5 rounded-mm-md border border-border bg-surface-base px-3 py-1.5 text-xs font-medium text-ink-dark hover:border-ink-dark hover:bg-surface-secondary transition-all duration-200 mm-press"
        [class.bg-cta]="showCode()"
        [class.text-cta-fg]="showCode()"
        [class.border-cta]="showCode()"
      >
        <svg
          class="size-3.5 transition-transform duration-300"
          [class.rotate-180]="showCode()"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m7 8-4 4 4 4M17 8l4 4-4 4M14 4l-4 16"></path>
        </svg>
        {{ showCode() ? 'Ocultar' : 'Código' }}
      </button>
    }
  </header>

  <div
    class="p-6 md:p-10"
    [class.bg-dotted]="background() === 'dotted'"
    [class.bg-grid]="background() === 'grid'"
  >
    <ng-content></ng-content>
  </div>

  @if (hasCode()) {
    <div
      class="grid transition-[grid-template-rows] duration-400 ease-out border-t"
      [class.grid-rows-[1fr]]="showCode()"
      [class.grid-rows-[0fr]]="!showCode()"
      [class.border-border-soft]="showCode()"
      [class.border-transparent]="!showCode()"
    >
      <div class="overflow-hidden">
        <div class="p-4 md:p-6 bg-surface-secondary/40 flex flex-col gap-3">
          @if (snippets().length > 1) {
            <nav
              class="inline-flex items-center gap-1 rounded-mm-pill bg-surface-base border border-border-soft p-1 w-fit shadow-mm-sm"
              role="tablist"
            >
              @for (snippet of snippets(); track snippet.label; let i = $index) {
                <button
                  type="button"
                  role="tab"
                  [attr.aria-selected]="activeTab() === i"
                  (click)="selectTab(i)"
                  class="relative inline-flex items-center gap-1.5 rounded-mm-pill px-3 py-1.5 text-xs font-medium transition-all duration-200 mm-press"
                  [class.bg-cta]="activeTab() === i"
                  [class.text-cta-fg]="activeTab() === i"
                  [class.shadow-mm-sm]="activeTab() === i"
                  [class.text-ink-secondary]="activeTab() !== i"
                  [class.hover:text-ink-dark]="activeTab() !== i"
                >
                  <span
                    class="size-1.5 rounded-full transition-colors"
                    [class.bg-current]="activeTab() === i"
                    [class.bg-ink-muted]="activeTab() !== i"
                  ></span>
                  {{ snippet.label }}
                </button>
              }
            </nav>
          }

          @if (activeSnippet(); as snippet) {
            <mm-code-block
              [code]="snippet.code"
              [lang]="snippet.lang"
              [title]="snippet.title ?? ''"
            />
          }
        </div>
      </div>
    </div>
  }
</section>
