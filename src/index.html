<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>MinimalMax Components Showcase</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Galería de componentes reutilizables con el ADN visual de MinimalMax — Angular 21 + Tailwind 4"
    />
    <meta name="theme-color" content="#1456f0" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mm-theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') document.documentElement.classList.add('mm-dark');
        } catch (e) {
          /* SSR or restricted storage */
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
