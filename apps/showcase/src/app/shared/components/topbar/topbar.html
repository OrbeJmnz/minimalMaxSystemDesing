<header
  class="sticky top-0 z-30 transition-all duration-200 backdrop-blur-xl mm-no-print"
  [class.bg-surface-base]="scrolled()"
  [class.bg-surface-base/80]="!scrolled()"
  [class.border-b]="scrolled()"
  [class.border-border-soft]="scrolled()"
  [class.shadow-mm-sm]="scrolled()"
>
  <div class="flex items-center justify-between gap-3 px-4 md:px-10 py-3">
    <button
      type="button"
      (click)="mobileNav.toggle()"
      aria-label="Abrir menú"
      class="md:hidden size-9 rounded-mm-md grid place-items-center text-ink-dark hover:bg-surface-secondary transition mm-press"
    >
      <svg
        class="size-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 6h18M3 12h18M3 18h18"></path>
      </svg>
    </button>

    <nav class="flex items-center gap-2 text-sm min-w-0 flex-1" aria-label="Breadcrumb">
      @for (crumb of breadcrumb.crumbs(); track crumb.label; let last = $last; let first = $first) {
        @if (!first) {
          <svg
            class="size-3.5 text-ink-muted shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m9 6 6 6-6 6"></path>
          </svg>
        }
        @if (crumb.path && !last) {
          <a
            [routerLink]="crumb.path"
            class="text-ink-muted hover:text-ink-dark transition-colors font-medium"
          >
            {{ crumb.label }}
          </a>
        } @else {
          <span class="font-display font-medium text-ink-dark truncate">{{ crumb.label }}</span>
        }
      }
    </nav>

    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="theme.toggle()"
        [attr.aria-label]="
          theme.mode() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'
        "
        class="size-9 rounded-mm-pill grid place-items-center text-ink-secondary hover:text-ink-dark hover:bg-surface-secondary transition mm-press cursor-pointer"
      >
        @if (theme.mode() === 'dark') {
          <svg
            class="size-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            ></path>
          </svg>
        } @else {
          <svg
            class="size-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>
      <a
        href="https://github.com"
        target="_blank"
        rel="noopener"
        aria-label="GitHub"
        class="size-9 rounded-mm-pill grid place-items-center text-ink-secondary hover:text-ink-dark hover:bg-surface-secondary transition mm-press"
      >
        <svg class="size-4" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.92.58.11.79-.25.79-.56v-2c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.78 1.19 1.78 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.83 1.19 3.09 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.13v3.16c0 .31.21.68.79.56C20.21 21.38 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5Z"
          />
        </svg>
      </a>
      <button
        type="button"
        class="hidden md:inline-flex items-center gap-2 rounded-mm-pill bg-surface-secondary px-3 py-1.5 text-xs text-ink-secondary hover:bg-border transition cursor-pointer mm-press"
        aria-label="Open command palette"
      >
        <svg
          class="size-3.5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        Buscar
        <kbd
          class="inline-flex items-center px-1.5 py-0.5 rounded-mm-sm bg-surface-base text-[10px] font-mono border border-border"
        >
          ⌘K
        </kbd>
      </button>
    </div>
  </div>

  <div class="h-0.5 bg-border-soft">
    <div
      class="h-full bg-linear-to-r from-brand-6 via-primary-500 to-brand-pink transition-[width] duration-150 ease-out"
      [style.width.%]="progress()"
    ></div>
  </div>
</header>
