<div class="space-y-10">
  <mm-section-header
    eyebrow="Datos"
    title="Calendar · Range · Events"
    description="Calendario mensual con range selection y eventos por día. Cero dependencias — usa Date nativo."
  />

  <mm-canvas-frame
    heading="Single date selection"
    description="Click para seleccionar un día. Hoy resaltado con ring brand. Días fuera del mes en muted."
    [snippets]="snippetsSingle"
  >
    <div class="flex flex-col md:flex-row items-start gap-6">
      <mm-calendar [(selected)]="singleDate" />
      <div class="rounded-mm-xl bg-surface-base border border-border-soft p-4 shadow-mm-sm">
        <p class="text-[10px] uppercase tracking-wider text-ink-muted font-semibold">
          Seleccionado
        </p>
        <p class="font-mono text-lg text-ink-dark mt-1">
          {{ singleDate() ?? '—' }}
        </p>
      </div>
    </div>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Date range selection"
    description="Click inicio + click fin. Hover entre fechas previsualiza el range con highlight."
    [snippets]="snippetsRange"
  >
    <div class="flex flex-col md:flex-row items-start gap-6">
      <mm-calendar mode="range" [(range)]="range" />
      <div class="rounded-mm-xl bg-surface-base border border-border-soft p-4 shadow-mm-sm">
        <p class="text-[10px] uppercase tracking-wider text-ink-muted font-semibold">Rango</p>
        <p class="font-mono text-sm text-ink-dark mt-1">
          {{ range().start ?? '—' }} → {{ range().end ?? '—' }}
        </p>
      </div>
    </div>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Calendar con eventos"
    description="Dots de color en celdas con eventos + sección de próximos eventos abajo."
    [snippets]="snippetsEvents"
  >
    <mm-calendar [events]="events" [(selected)]="singleDate" />
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Mini calendar"
    description="Versión compact para sidebars o popovers. Sin sección de eventos."
    [snippets]="snippetsMini"
  >
    <div class="flex flex-wrap gap-4">
      <mm-calendar size="sm" [(selected)]="singleDate" />
      <mm-calendar size="sm" [events]="events" [(selected)]="singleDate" />
    </div>
  </mm-canvas-frame>
</div>
