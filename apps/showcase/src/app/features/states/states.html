<div class="space-y-10">
  <mm-section-header
    eyebrow="Estados"
    title="Empty · Skeleton · 404 · Maintenance"
    description="Estados de UI con la firma MinimalMax — ilustraciones inline SVG, animaciones suaves, jerarquía clara y accionable."
  />

  <mm-canvas-frame
    heading="Empty state básico"
    description="Cuando una lista o sección no tiene contenido todavía. Siempre con CTA primaria."
    [snippets]="snippetsEmpty"
  >
    <mm-empty-state
      title="Aún no hay componentes guardados"
      description="Cuando guardes un componente desde la galería aparecerá aquí para acceder rápido."
      variant="brand"
    >
      <div slot="actions" class="flex items-center gap-2">
        <button
          type="button"
          mmRipple
          class="rounded-mm-md bg-cta px-5 py-2.5 text-sm font-medium text-white shadow-mm-sm hover:shadow-mm-elevated mm-press hover:-translate-y-0.25 transition-all duration-200"
        >
          Explorar galería
        </button>
        <button
          type="button"
          class="rounded-mm-md border border-border bg-surface-base px-5 py-2.5 text-sm font-medium text-ink-dark hover:border-ink-dark mm-press hover:-translate-y-0.25 transition-all duration-200"
        >
          Ver tutorial
        </button>
      </div>
    </mm-empty-state>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Skeleton loaders"
    description="Placeholders que respiran. Forma del contenido final para reducir layout shift."
    [snippets]="snippetsSkeleton"
  >
    <div class="flex flex-col gap-6">
      <button
        type="button"
        mmRipple
        (click)="simulateLoading()"
        class="self-start inline-flex items-center gap-2 rounded-mm-md bg-brand-6 px-4 py-2 text-sm font-medium text-white shadow-mm-brand hover:shadow-mm-elevated transition mm-press"
      >
        <svg
          class="size-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"
          ></path>
        </svg>
        Simular carga (1.8s)
      </button>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        @for (n of [1, 2, 3]; track n) {
          <div class="rounded-mm-2xl bg-surface-base border border-border-soft p-5 shadow-mm-sm">
            @if (isLoading()) {
              <mm-skeleton width="44px" height="44px" radius="var(--radius-mm-md)" />
              <div class="mt-4 space-y-2">
                <mm-skeleton width="60%" height="14px" />
                <mm-skeleton width="100%" height="12px" />
                <mm-skeleton width="80%" height="12px" />
              </div>
              <div class="mt-4">
                <mm-skeleton width="110px" height="32px" radius="9999px" />
              </div>
            } @else {
              <div
                class="size-11 rounded-mm-md bg-linear-to-br from-primary-500 to-brand-deep shadow-mm-brand"
              ></div>
              <h4 class="font-display text-base font-medium text-ink-dark mt-4">Modelo {{ n }}</h4>
              <p class="text-sm text-ink-secondary mt-1">Contenido cargado tras la simulación.</p>
              <button
                type="button"
                class="mt-4 rounded-mm-pill bg-surface-secondary px-4 py-1.5 text-xs font-medium text-ink-dark"
              >
                Ver detalles
              </button>
            }
          </div>
        }
      </div>
    </div>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="404 — Página no encontrada"
    description="El estado más temido. La idea: nunca dejar al usuario sin salida."
    [snippets]="snippets404"
  >
    <div
      class="rounded-mm-2xl border border-border-soft bg-linear-to-br from-surface-base to-surface-secondary py-12"
    >
      <mm-empty-state
        title="Esta página se fue al limbo"
        description="La ruta que buscas no existe o fue movida. Vuelve al inicio o usa la búsqueda del sidebar para encontrar otro componente."
        variant="error"
      >
        <span slot="icon">
          <span class="relative font-display text-6xl font-medium text-ink-dark"> 404 </span>
        </span>
        <div slot="actions" class="flex items-center gap-2">
          <button
            type="button"
            mmRipple
            (click)="goHome()"
            class="rounded-mm-md bg-cta px-5 py-2.5 text-sm font-medium text-white shadow-mm-sm hover:shadow-mm-elevated transition-all duration-200 mm-press hover:-translate-y-0.25"
          >
            ← Volver al inicio
          </button>
          <button
            type="button"
            class="rounded-mm-md border border-border bg-surface-base px-5 py-2.5 text-sm font-medium text-ink-dark hover:border-ink-dark transition-all duration-200 mm-press hover:-translate-y-0.25"
          >
            Reportar enlace roto
          </button>
        </div>
      </mm-empty-state>
    </div>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Mantenimiento"
    description="Cuando el sistema está fuera de línea por update programado."
    [snippets]="snippetsMaintenance"
  >
    <div
      class="rounded-mm-2xl border border-border-soft bg-linear-to-br from-amber-50 to-surface-base py-12"
    >
      <mm-empty-state
        title="Volvemos en unos minutos"
        description="Estamos desplegando mejoras de rendimiento. La galería volverá disponible aproximadamente a las 14:30 hrs CDMX."
        variant="warning"
      >
        <span slot="icon">
          <svg
            class="relative size-9"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
            ></path>
          </svg>
        </span>
        <div slot="actions">
          <button
            type="button"
            mmRipple
            class="rounded-mm-md bg-warning px-5 py-2.5 text-sm font-medium text-white shadow-mm-sm hover:shadow-mm-elevated transition-all duration-200 mm-press hover:-translate-y-0.25"
          >
            Suscribirme a updates
          </button>
        </div>
      </mm-empty-state>
    </div>
  </mm-canvas-frame>

  <mm-canvas-frame
    heading="Empty — variantes"
    description="Distintos contextos: sin resultados, success completo, sin permisos."
    [snippets]="snippetsVariants"
  >
    <div data-stagger class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="rounded-mm-2xl border border-border-soft bg-surface-base">
        <mm-empty-state
          title="Sin resultados"
          description="Tu búsqueda no encontró componentes."
          variant="default"
        />
      </div>
      <div class="rounded-mm-2xl border border-border-soft bg-surface-base">
        <mm-empty-state
          title="Todo al corriente"
          description="No hay notificaciones pendientes."
          variant="success"
        >
          <svg
            slot="icon"
            class="relative size-8"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </mm-empty-state>
      </div>
      <div class="rounded-mm-2xl border border-border-soft bg-surface-base">
        <mm-empty-state
          title="Sin permisos"
          description="Pide acceso al administrador del equipo."
          variant="error"
        >
          <svg
            slot="icon"
            class="relative size-8"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </mm-empty-state>
      </div>
    </div>
  </mm-canvas-frame>
</div>
